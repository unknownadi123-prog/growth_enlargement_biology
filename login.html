<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX // Operator Uplink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#020617] text-slate-200 flex items-center justify-center min-h-screen font-mono">
    <div class="w-full max-w-sm">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-black italic text-white tracking-tighter uppercase mb-2">Access_Denied</h2>
            <p class="text-[10px] text-blue-600 uppercase tracking-[0.4em] font-bold">Encrypted Operator Uplink</p>
        </div>

        <div class="bg-slate-900/80 p-1 border-t-2 border-blue-600 shadow-2xl">
            <div class="p-8 space-y-6">
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">Operator_ID</label>
                    <input type="email" id="email" class="w-full bg-[#020617] border border-slate-800 p-4 outline-none focus:border-blue-600 text-sm text-white transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">Cipher_Key</label>
                    <input type="password" id="password" class="w-full bg-[#020617] border border-slate-800 p-4 outline-none focus:border-blue-600 text-sm text-white transition">
                </div>
                <button onclick="auth('login')" class="w-full bg-blue-600 py-5 font-black uppercase tracking-[0.3em] text-xs hover:bg-white hover:text-black transition duration-300">Authorize</button>
                <button onclick="auth('signup')" class="w-full text-slate-600 text-[9px] uppercase font-bold hover:text-blue-500 transition">Register_New_Apex_Build</button>
            </div>
        </div>
        <p id="msg" class="mt-6 text-[10px] text-red-600 uppercase text-center font-bold tracking-widest"></p>
    </div>

    <script>
        const SB_URL = 'https://upfmksjiyptnckjauaut.supabase.co'; 
        const SB_KEY = 'sb_publishable_7KuZJLPkSkUhnDUVBPMJIw_SZXTEsoe';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = (type === 'signup') 
                ? await supabase.auth.signUp({ email, password })
                : await supabase.auth.signInWithPassword({ email, password });

            if (error) document.getElementById('msg').innerText = "ALERT: " + error.message.toUpperCase();
            else window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
