<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restore Health | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 flex items-center justify-center min-h-screen p-6 font-mono">
    <div class="w-full max-w-md bg-slate-900 border border-slate-700 p-8 rounded-sm shadow-2xl">
        <div class="mb-8 border-b border-slate-700 pb-4">
            <h2 class="text-xl font-bold text-white uppercase tracking-widest">Portal_Access</h2>
            <p class="text-[10px] text-slate-500">ENCRYPTION: AES-256-GCM ACTIVE</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Patient Email" class="w-full bg-slate-800 border border-slate-700 rounded p-3 outline-none focus:border-blue-500 text-sm">
            <input type="password" id="password" placeholder="Access Key" class="w-full bg-slate-800 border border-slate-700 rounded p-3 outline-none focus:border-blue-500 text-sm">
            <button onclick="auth('login')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded font-bold text-xs uppercase tracking-[0.2em] transition">Execute Login</button>
            <button onclick="auth('signup')" class="w-full border border-slate-700 py-2 rounded text-[10px] text-slate-500 uppercase hover:bg-slate-800 transition">Register New Record</button>
        </div>
        <p id="msg" class="mt-4 text-[10px] text-red-500 uppercase text-center"></p>
    </div>

    <script>
        // PASTE YOUR REAL KEYS HERE
        const SB_URL = 'https://upfmksjiyptnckjauaut.supabase.co'; 
        const SB_KEY = 'sb_publishable_7KuZJLPkSkUhnDUVBPMJIw_SZXTEsoe';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function auth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = (type === 'signup') 
                ? await supabase.auth.signUp({ email, password })
                : await supabase.auth.signInWithPassword({ email, password });

            if (error) document.getElementById('msg').innerText = "SYSTEM_ERROR: " + error.message.toUpperCase();
            else window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
