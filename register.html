<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Labs // New Build Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* This matches your login page framing exactly */
        .mood-image { 
            filter: grayscale(100%) contrast(125%) brightness(55%);
            /* Flips him to face the form */
            transform: scaleX(-1); 
            /* Forces the subject into the frame */
            object-position: center; 
        }
        
        /* The grid background for the right side */
        .bg-grid {
            background-image: linear-gradient(to right, #0f172a 1px, transparent 1px), 
                              linear-gradient(to bottom, #0f172a 1px, transparent 1px);
            background-size: 30px 30px;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex font-mono uppercase tracking-tight selection:bg-red-900">

    <div class="grid grid-cols-1 md:grid-cols-2 w-full">
        
        <div class="relative overflow-hidden hidden md:block border-r border-slate-800">
            <img src="login-vibe.jpg" alt="Subject" class="absolute inset-0 w-full h-full object-cover mood-image">
            
            <div class="absolute inset-0 bg-gradient-to-l from-[#020617] via-transparent to-transparent opacity-90"></div>
            
            <div class="absolute top-10 left-10 text-red-600 text-[10px] font-black tracking-[0.5em] status-pulse">
                STATUS: INITIALIZING_NEW_SUBJECT
            </div>
        </div>

        <div class="flex items-center justify-center p-8 lg:p-20 relative bg-grid">
            <div class="w-full max-w-sm space-y-12 z-20">
                
                <div class="text-center space-y-2">
                    <h2 class="text-4xl font-black italic text-white tracking-tighter uppercase mb-1">New_Build</h2>
                    <p class="text-[10px] text-red-600 uppercase tracking-[0.4em] font-bold">Registration // Station_045</p>
                    <div class="h-[1px] w-24 bg-red-800 mx-auto"></div>
                </div>

                <div class="space-y-6">
                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-bold text-slate-500 tracking-[0.3em]">Assign_User_ID</label>
                        <input type="email" id="email" placeholder="OPERATOR@APEX.LABS" class="w-full bg-slate-900 border border-slate-700 p-4 outline-none focus:border-red-600 text-sm text-white transition placeholder:text-slate-800">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-bold text-slate-500 tracking-[0.3em]">Security_Cipher</label>
                        <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 p-4 outline-none focus:border-red-600 text-sm text-white transition placeholder:text-slate-800">
                    </div>
                    
                    <div class="flex flex-col gap-4 pt-4">
                        <button onclick="signUp()" class="w-full bg-red-800 py-5 font-black uppercase tracking-[0.3em] text-[11px] text-white hover:bg-white hover:text-black transition duration-30
