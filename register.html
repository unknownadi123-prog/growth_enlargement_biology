<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Labs // New Build Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .mood-image { 
            filter: grayscale(100%) contrast(110%) brightness(40%);
            transform: scaleX(-1); /* Keep him looking at the form */
            object-position: center; 
        }
        .bg-grid {
            background-image: linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex font-mono uppercase tracking-tight bg-grid">

    <div class="grid grid-cols-1 md:grid-cols-2 w-full">
        <div class="relative overflow-hidden hidden md:block border-r border-red-900/20">
            <img src="login-vibe.jpg" alt="New Build" class="absolute inset-0 w-full h-full object-cover mood-image">
            <div class="absolute inset-0 bg-gradient-to-l from-[#020617] via-transparent to-transparent opacity-90"></div>
            <div class="absolute top-10 left-10 text-red-600 text-[10px] font-black tracking-[0.5em]">
                STATUS: INITIALIZING_NEW_SUBJECT
            </div>
        </div>

        <div class="flex items-center justify-center p-8 lg:p-20 relative">
            <div class="w-full max-w-sm space-y-10">
                <div class="space-y-2">
                    <h2 class="text-3xl font-black italic text-white tracking-tighter">New_Build_Entry</h2>
                    <p class="text-[9px] text-slate-500 tracking-[0.3em]">Create your private biometric vault</p>
                    <div class="h-[1px] w-full bg-red-900/30"></div>
                </div>

                <div class="space-y-6">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-red-500 tracking-widest">Assign_User_ID</label>
                        <input type="email" id="email" placeholder="EMAIL@PROTOCOL.COM" class="w-full bg-slate-900/50 border border-slate-800 p-4 outline-none focus:border-red-600 text-sm text-white transition">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-red-500 tracking-widest">Assign_Security_Cipher</label>
                        <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-900/50 border border-slate-800 p-4 outline-none focus:border-red-600 text-sm text-white transition">
                    </div>
                    
                    <button onclick="signUp()" class="w-full bg-red-700 py-5 font-black uppercase tracking-[0.3em] text-[11px] text-white hover:bg-white hover:text-black transition transform hover:-translate-y-1">Initialize_Subject</button>
                    
                    <div class="text-center">
                        <a href="login.html" class="text-[9px] text-slate-600 hover:text-white transition tracking-widest">Existing Operator? Uplink Here</a>
                    </div>
                </div>

                <p id="msg" class="text-[10px] text-center font-bold tracking-widest min-h-[20px]"></p>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://upfmksjiyptnckjauaut.supabase.co'; 
        const SB_KEY = 'sb_publishable_7KuZJLPkSkUhnDUVBPMJIw_SZXTEsoe';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');
            
            msgBox.className = "text-[10px] text-blue-500 animate-pulse";
            msgBox.innerText = "INDEXING_BIOMETRICS...";

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                msgBox.className = "text-[10px] text-red-600";
                msgBox.innerText = "ERROR: " + error.message.toUpperCase();
            } else {
                msgBox.className = "text-[10px] text-green-500";
                msgBox.innerText = "SUBJECT_CREATED. REDIRECTING...";
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            }
        }
    </script>
</body>
</html>
