<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Labs // New Build Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* FIX: Flips and pulls the subject into the frame from the left */
        .mood-image { 
            filter: grayscale(100%) contrast(115%) brightness(45%);
            transform: scaleX(-1); 
            object-position: left center; 
            width: 100%;
            height: 100%;
        }
        
        .bg-grid {
            background-image: linear-gradient(to right, #0f172a 1px, transparent 1px), 
                              linear-gradient(to bottom, #0f172a 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Subtle pulse for the "Initializing" status */
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-pulse { animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen flex font-mono uppercase tracking-tight bg-grid selection:bg-red-900">

    <div class="grid grid-cols-1 md:grid-cols-2 w-full">
        
        <div class="relative overflow-hidden hidden md:block border-r border-red-900/20">
            <img src="login-vibe.jpg" alt="New Build" class="absolute inset-0 object-cover mood-image">
            
            <div class="absolute inset-0 bg-gradient-to-l from-[#020617] via-transparent to-transparent opacity-90"></div>
            
            <div class="absolute top-10 left-10 text-red-600 text-[10px] font-black tracking-[0.5em] status-pulse">
                STATUS: INITIALIZING_NEW_SUBJECT
            </div>
        </div>

        <div class="flex items-center justify-center p-8 lg:p-20 relative">
            <div class="w-full max-w-sm space-y-10 z-10">
                
                <div class="space-y-3">
                    <h2 class="text-4xl font-black italic text-white tracking-tighter uppercase">New_Build</h2>
                    <p class="text-[10px] text-slate-500 tracking-[0.3em] leading-relaxed">Secure registration for private biometric tracking vault</p>
                    <div class="h-[2px] w-full bg-gradient-to-r from-red-900/50 to-transparent"></div>
                </div>

                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-red-500 tracking-[0.2em]">Assign_User_ID</label>
                        <input type="email" id="email" placeholder="OPERATOR@APEX.LABS" 
                               class="w-full bg-[#030712] border border-slate-800 p-4 outline-none focus:border-red-600 text-sm text-white transition placeholder:text-slate-900">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-red-500 tracking-[0.2em]">Security_Cipher</label>
                        <input type="password" id="password" placeholder="••••••••" 
                               class="w-full bg-[#030712] border border-slate-800 p-4 outline-none focus:border-red-600 text-sm text-white transition placeholder:text-slate-900">
                    </div>
                    
                    <div class="pt-4 space-y-4">
                        <button onclick="signUp()" 
                                class="w-full bg-red-800 py-5 font-black uppercase tracking-[0.4em] text-[11px] text-white hover:bg-white hover:text-black transition duration-500 transform hover:-translate-y-1 shadow-lg shadow-red-900/10">
                            Initialize_Entry
                        </button>
                        
                        <div class="text-center">
                            <a href="login.html" class="text-[10px] text-slate-600 hover:text-red-500 transition tracking-[0.2em] font-bold">
                                Existing Operator? Uplink_Access
                            </a>
                        </div>
                    </div>
                </div>

                <div class="pt-6 text-center">
                    <p id="msg" class="text-[10px] font-bold tracking-[0.2em] min-h-[20px] mb-2"></p>
                    <p class="text-[9px] text-slate-800 tracking-tighter">PROTO_LEVEL_SECURE_CHANNEL // SYNC_ACTIVE</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Your specific Supabase credentials
        const SB_URL = 'https://upfmksjiyptnckjauaut.supabase.co'; 
        const SB_KEY = 'sb_publishable_7KuZJLPkSkUhnDUVBPMJIw_SZXTEsoe';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg');
            
            if(!email || !password) {
                msgBox.className = "text-red-600";
                msgBox.innerText = "ERROR: NULL_VALUES_DETECTED";
                return;
            }

            msgBox.className = "text-blue-500 animate-pulse";
            msgBox.innerText = "INDEXING_BIOMETRICS...";

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                msgBox.className = "text-red-600";
                msgBox.innerText = "DENIED: " + error.message.toUpperCase();
            } else {
                msgBox.className = "text-green-500";
                msgBox.innerText = "SUBJECT_CREATED. REDIRECTING...";
                setTimeout(() => { 
                    window.location.href = 'dashboard.html'; 
                }, 2000);
            }
        }
    </script>
</body>
</html>
