<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Labs // Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { 
            background-color: #020617; 
            color: #e2e8f0; 
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* The "Login Page" Aesthetics */
        .sidebar-item { transition: all 0.2s ease; border-left: 3px solid transparent; }
        .sidebar-active { background: rgba(153, 27, 27, 0.1); border-left-color: #991b1b; color: #fff; }
        
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid #1e293b; 
            backdrop-filter: blur(8px);
        }

        .progress-bar { height: 4px; background: #0f172a; overflow: hidden; }
        .progress-fill { height: 100%; background: #991b1b; transition: width 1s ease; }

        /* Ghost Mode Overlay */
        #ghostLayer { background: white; display: none; position: fixed; inset: 0; z-index: 9999; color: #333; padding: 20px; font-family: sans-serif; text-transform: none; }

        /* Scanline Overlay (From your index page) */
        .form-scanlines::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(153, 27, 27, 0.02), rgba(30, 41, 59, 0.02));
            z-index: 5; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.3;
        }
    </style>
</head>
<body class="flex h-screen form-scanlines">

    <div id="ghostLayer">
        <p>Project_Requirements_v.04.xlsx - Microsoft Excel</p>
        <hr>
        <p>Analyzing structural design data for prototype development...</p>
    </div>

    <aside class="w-64 bg-[#020617] border-r border-slate-800 flex flex-col z-20">
        <div class="p-8 border-b border-slate-800/50">
            <h1 class="text-xl font-black italic tracking-tighter text-white">Apex Labs</h1>
            <p class="text-[8px] text-slate-500 tracking-[0.4em] font-bold">Core // Uplink</p>
        </div>

        <nav class="flex-1 px-3 mt-6 space-y-1">
            <div class="sidebar-item sidebar-active p-4 flex items-center gap-4 cursor-pointer">
