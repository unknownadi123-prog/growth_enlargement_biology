<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX LABS // MISSION CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body { 
            background-color: #020617; 
            color: #cbd5e1; 
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            text-transform: uppercase;
            font-size: 14px; 
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(30, 41, 59, 0.7);
            border-radius: 24px;
            backdrop-filter: blur(12px);
        }

        .biometric-container {
            position: relative;
            background: #000;
            border-radius: 30px;
        }

        .hologram-asset {
            mix-blend-mode: lighten;
            filter: contrast(1.2) brightness(1.1);
        }

        .floating-scan-card {
            position: absolute;
            top: 15%;
            right: 8%;
            width: 180px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(153, 27, 27, 0.5);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(153, 27, 27, 0.2);
            z-index: 10;
        }

        .scan-animation {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #991b1b, transparent);
            position: absolute;
            box-shadow: 0 0 15px #991b1b;
            animation: moveScan 4s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes moveScan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .text-apex-red { color: #991b1b; }
        .bg-apex-red { background-color: #991b1b; }
        
        .sidebar { width: 70px; transition: width 0.3s; overflow: hidden; white-space: nowrap; }
        .sidebar:hover { width: 260px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar bg-[#020617] border-r border-slate-800 flex flex-col z-50 group">
        <div class="p-4 mb-10"><div class="w-10 h-10 bg-apex-red rounded-sm shadow-[0_0_15px_rgba(153,27,27,0.4)]"></div></div>
        <nav class="flex-1 px-3 space-y-6">
            <div class="p-2 text-slate-500 hover:text-white cursor-pointer flex items-center gap-4">
                <span class="text-2xl">⚙️</span> <span class="group-hover:inline hidden text-[12px]">OPERATOR_SETTINGS</span>
            </div>
            <div class="p-2 text-slate-500 hover:text-white cursor-pointer flex items-center gap-4">
                <span class="text-2xl">👤</span> <span class="group-hover:inline hidden text-[12px]">ID: STATION_045</span>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col p-8 relative overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex flex-col">
                <span class="text-[12px] text-apex-red font-bold tracking-[0.3em]">COMMAND_PROTOCOL_ACTIVE</span>
                <h1 class="text-3xl font-black italic text-white leading-none">OPERATOR_<span class="text-apex-red">STATION_045</span></h1>
            </div>
            
            <nav class="bg-slate-900/50 border border-slate-800 rounded-full px-8 py-3 flex gap-10">
                <a href="#" class="text-[12px] font-bold text-white border-b-2 border-apex-red">01_COMMAND</a>
                <a href="#" class="text-[12px] font-bold text-slate-500 hover:text-white">02_VAULT</a>
                <a href="#" class="text-[12px] font-bold text-slate-500 hover:text-white">03_GYM</a>
                <a href="#" class="text-[12px] font-bold text-slate-500 hover:text-white">04_SIM</a>
            </nav>

            <div class="text-right">
                <span class="text-[11px] text-slate-500 block">UPLINK_STATUS</span>
                <span class="text-[12px] font-bold text-blue-500 animate-pulse">SYNC_ACTIVE // LIVE</span>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8 flex-1">
            
            <div class="col-span-5 flex flex-col">
                <div class="flex gap-4 mb-6">
                    <div class="glass-card flex-1 p-5 border-l-4 border-apex-red">
                        <p class="text-[10px] text-slate-500 font-bold">LENGTH (BPEL)</p>
                        <p class="text-2xl font-black text-white italic">8.20 <span class="text-[12px] text-slate-600">IN</span></p>
                    </div>
                    <div class="glass-card flex-1 p-5 border-l-4 border-apex-red">
                        <p class="text-[10px] text-slate-500 font-bold">GIRTH (MID)</p>
                        <p class="text-2xl font-black text-white italic">5.80 <span class="text-[12px] text-slate-600">IN</span></p>
                    </div>
                </div>

                <div class="flex-1 biometric-container glass-card p-0 relative flex items-center justify-center overflow-hidden border-none shadow-[inset_0_0_80px_rgba(153,27,27,0.3)]">
                    <div class="scan-animation"></div>
                    <div class="floating-scan-card backdrop-blur-md">
