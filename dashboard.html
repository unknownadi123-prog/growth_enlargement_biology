<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Biology Lab Notes - Unit 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <nav class="border-b border-slate-800 p-4 flex justify-between items-center">
        <h1 class="text-xs font-mono text-slate-500 uppercase tracking-widest">Research_Project_Alpha // Secure_Vault</h1>
        <div id="sync-status" class="text-xs text-yellow-500 font-mono">● STANDBY</div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 space-y-8">
        <section class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700 shadow-xl text-center">
            <h2 class="text-xl font-bold mb-4 text-cyan-400">Anatomical Performance Map</h2>
            <div class="w-full max-w-md mx-auto">
                <canvas id="performanceRadar"></canvas>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700">
                <h3 class="text-lg font-semibold mb-4">Metric Input</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Length (BPEL)</label>
                        <input type="number" id="len-in" step="0.1" class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:border-cyan-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Girth (Mid)</label>
                        <input type="number" id="gir-in" step="0.1" class="w-full bg-slate-900 border border-slate-600 rounded p-2 focus:border-cyan-500 outline-none">
                    </div>
                </div>
            </section>

            <section class="bg-slate-800/50 rounded-2xl p-6 border border-slate-700">
                <h3 class="text-lg font-semibold mb-4">EQ & Stamina</h3>
                <div class="space-y-4">
                    <label class="block text-xs text-slate-400 mb-1 text-center">Hardness Score: 1-10</label>
                    <input type="range" id="eq-in" min="1" max="10" class="w-full accent-cyan-500">
                    <button onclick="logSession()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg transition uppercase text-sm tracking-widest">Start Training Session</button>
                </div>
            </section>
        </div>
    </main>

    <script>
        // --- 1. CLOUD CONFIG (PASTE YOUR KEYS HERE) ---
      const SB_URL = 'https://upfmksjiyptnckjauaut.supabase.co'; 
      const SB_KEY = 'sb_publishable_7KuZJLPkSkUhnDUVBPMJIw_SZXTEsoe';

        // --- 2. THE RADAR CHART ---
        const ctx = document.getElementById('performanceRadar').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Length', 'Girth', 'Hardness', 'Stamina', 'Recovery', 'Control'],
                datasets: [{
                    label: 'Current Status',
                    data: [5, 4, 7, 3, 6, 5], 
                    backgroundColor: 'rgba(34, 211, 238, 0.2)',
                    borderColor: 'rgba(34, 211, 238, 1)',
                    borderWidth: 2,
                    pointBackgroundColor: '#22d3ee'
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: '#334155' },
                        grid: { color: '#334155' },
                        pointLabels: { color: '#94a3b8', font: { size: 12 } },
                        ticks: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 10
                    }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- 3. CLOUD SYNC LOGIC ---
        async function logSession() {
            const status = document.getElementById('sync-status');
            status.innerText = "● SYNCING...";
            status.className = "text-xs text-blue-500 font-mono";

            const payload = {
                length_bpel: document.getElementById('len-in').value,
                girth_mid: document.getElementById('gir-in').value,
                eq_score: document.getElementById('eq-in').value
            };

            const response = await fetch(`${SB_URL}/rest/v1/performance_logs`, {
                method: 'POST',
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': `Bearer ${SB_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                status.innerText = "● DATA SECURED";
                status.className = "text-xs text-green-500 font-mono";
                alert("Session metrics synced to cloud.");
            } else {
                status.innerText = "● SYNC ERROR";
                status.className = "text-xs text-red-500 font-mono";
            }
        }

        // --- 4. THE BOSS KEY (PRESS ESC TO HIDE) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.location.href = 'https://www.google.com/search?q=mitosis+notes';
            }
        });
    </script>
</body>
</html>
